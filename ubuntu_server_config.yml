---


- hosts: linux_server
  become: yes
  vars_files:
    - vars/vault.yml
  vars:
    samba_users:
      - { name: 'martin', group: 'it', password: 'martin12345'}
      - { name: 'chunga', group: 'finance', password: 'chunga12345'}
      - { name: 'cathy', group: 'operations', password: 'cathy12345'}
      - { name: 'grace', group: 'legal', password: 'grace12345'}

    samba_shares:
      - name: PUBLIC
        path: /srv/samba/public
        comment: "This is public share for all departments"
        guest_ok: yes
      - name: IT
        path: /srv/samba/it
        comment: "This folder is for the IT department only"
        valid_users: "@it"
        force_group: 'it'
      - name: FINANCE
        path: /srv/samba/finance
        comment: "This folder is for the Finance department only"
        valid_users: "@finance"
        force_group: 'finance'
      - name: LEGAL
        path: /srv/samba/legal
        comment: "This folder is for the Legal department only"
        valid_users: "@legal"
        force_group: 'legal'
      - name: OPERATIONS
        path: /srv/samba/operations
        comment: "This folder is for the Operations department only"
        valid_users: "@operations"
        force_group: 'operations'

    apache_modules:
      - rewrite
      - ssl
      - headers
      - proxy
      - proxy_http
      - proxy_wstunnel
      - deflate
      - expires
      - socache_shmcb

    # Global Parameters
    apache_server_admin: "ansible@malawi.com"
    apache_timeout: 300
    apache_keepalive: "On"
    apache_keepalive_timeout: 5
    apache_max_keepalive_requests: 100

    # Event MPM Parameter Tuning
    apache_mpm: "event"
    apache_mpm_start_servers: 2
    apache_mpm_min_spare_threads: 25
    apache_mpm_max_spare_threads: 75
    apache_mpm_thread_limit: 64
    apache_mpm_threads_per_child: 25
    apache_mpm_max_request_workers: 150

    # Virtual Host Declarations
    apache_vhosts:
      - domain: "malawi.com"
      - domain: "test.local"

    # Monitoring Tool Versions
    prometheus_version: "3.0.0" # Current stable version
    node_exporter_version: "1.8.2"

    # System Security Hardening Parameters
    ssh_port: 22
    allowed_management_subnets:
      - "192.168.106.0/24" # Permits traffic from your local network segment


  tasks:
 # - name: UPDATE REPOSITORIES
 #   apt:
 #     update_cache: yes

  - name: INSTALL APACHE2 WEB SERVER
    apt:
      name: apache2
      state: latest

  - name: SET GLOBAL SERVERNAME TO SILENCE WARNINGS
    ansible.builtin.lineinfile:
      path: /etc/apache2/apache2.conf
      line: "ServerName 127.0.0.1"
      state: present
    notify: RESTART APACHE

  - name: ENSURE APACHE LOG DIRECTORY EXISTS
    file:
      path: /etc/apache2/logs
      state: directory
      owner: root
      group: root
      mode: "0755"

  - name: ENABLE APACHE MODULES
    apache2_module:
      name: "{{ item }}"
      state: present
    loop: "{{ apache_modules }}"
    notify: RESTART APACHE

  - name: DISABLE CONFLICTING APACHE MPM PREFORK MODULES
    apache2_module:
      name: mpm_prefork
      state: absent
      ignore_configcheck: true
    notify: RESTART APACHE

  - name: ENABLE THE TARGETED APACHE MPM MODULE
    apache2_module:
      name: "mpm_{{ apache_mpm }}"
      state: present
      ignore_configcheck: true
    notify: RESTART APACHE

  - name: DEPLOY THE DYNAMIC MAIN APACHE SYSTEM CONFIGURATION
    template:
      src: templates/apache2.conf.j2
      dest: /etc/apache2/apache2.conf
      owner: root
      group: root
      mode: "0644"
    notify: RESTART APACHE

  - name: ENSURE APACHE2 IS STARTED AND ENABLED
    systemd:
      name: apache2
      state: started
      enabled: true
    when: ansible_facts['os_family'] == "Debian"

  - name: DEPLOY HARDENED CORE SECURITY CONFIGS
    ansible.builtin.copy:
      dest: /etc/apache2/conf-available/security.conf
      content: |
        # Security configuration - managed by Ansible
        ServerTokens Prod
        ServerSignature Off
        Header always set X-Frame-Options "SAMEORIGIN"
        Header always set X-Content-Type-Options "nosniff"
        Header always set X-XSS-Protection "1; mode=block"
        Header always set Referrer-Policy "strict-origin-when-cross-origin"
        <Directory />
            Options -Indexes
            AllowOverride None
            Require all denied
        </Directory>
        TraceEnable Off
        LimitRequestBody 10485760
      owner: root
      group: root
      mode: "0644"
    notify: RESTART APACHE

  - name: ENABLE CORE SECURITY RUNTIME ADJUSTMENT
    ansible.builtin.command:
      cmd: a2enconf security
    register: security_conf
    changed_when: "'Enabling' in security_conf.stdout or 'already enabled' not in security_conf.stdout"
    when: ansible_facts['os_family'] == "Debian"
    notify: RESTART APACHE

  - name: PROVISION THE WEB DOCUMENTATION ROOT TARGETS
    ansible.builtin.file:
      path: "/var/www/{{ item.domain }}/public_html"
      state: directory
      owner: www-data
      group: www-data
      mode: "0755"
    loop: "{{ apache_vhosts }}"
    when: ansible_facts['os_family'] == "Debian"

  - name: SEED TEST VIRTUAL HOST ENTRY POINTS
    ansible.builtin.copy:
      dest: "/var/www/{{ item.domain }}/public_html/index.html"
      content: "<h1>Welcome to {{ item.domain }}! Managed by Martin Chunga through Ansible :)).</h1>"
      owner: www-data
      group: www-data
      mode: "0644"
    loop: "{{ apache_vhosts }}"
    when: ansible_facts['os_family'] == "Debian"

  - name: RENDER CUSTOM VIRTUAL HOSTS DEFINITIONS
    ansible.builtin.template:
      src: templates/vhost.conf.j2
      dest: /etc/apache2/sites-available/{{ item.domain }}.conf
      owner: root
      group: root
      mode: "0644"
    loop: "{{ apache_vhosts }}"
    when: ansible_facts['os_family'] == "Debian"
    notify: RESTART APACHE

  - name: ENABLE CUSTOM VIRTUAL HOST CONFIGIGS
    ansible.builtin.command:
      cmd: "a2ensite {{ item.domain }}.conf"
    register: site_enable
    changed_when: "'Enabling' in site_enable.stdout"
    loop: "{{ apache_vhosts }}"
    when: ansible_facts['os_family'] == "Debian"
    notify: RESTART APACHE

  - name: DEPLOY SSL CONFIGS
    ansible.builtin.copy:
      dest: /etc/apache2/conf-available/ssl-params.conf
      content: |
        # SSL Parameters - managed by Martin Chunga through Ansible
        SSLProtocol all -SSLv3 -TLSv1 -TLSv1.1
        SSLCipherSuite ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384
        SSLHonorCipherOrder off
        SSLSessionTickets off
        SSLUseStapling On
        # Using absolute path for the logs directory we created
        SSLStaplingCache "shmcb:/etc/apache2/logs/ssl_stapling(32768)"
        Header always set Strict-Transport-Security "max-age=63072000"
      mode: "0644"
      owner: root
      group: root
    notify: RESTART APACHE

  - name: ENABLE SSL CONFIGS
    ansible.builtin.command:
      cmd: a2enconf ssl-params
    register: ssl_conf
    changed_when: "'Enabling' in ssl_conf.stdout or 'already enabled' not in ssl_conf.stdout"
    when: ansible_facts['os_family'] == "Debian"
    notify: RESTART APACHE

  - name: DISABLE THE DEFAULT APACHE CONFIG
    ansible.builtin.command:
      cmd: a2dissite 000-default.conf
    register: site_disable
    changed_when: "'Site 000-default disabled' in site_disable.stdout"
    failed_when: false
    when: ansible_facts['os_family'] == "Debian"
    notify: RESTART APACHE

  - name: INSTALL SAMBA PACKAGE ON UBUNTU
    apt:
      name:
       - samba
       - samba-common-bin
       - smbclient
      state: latest
    when: ansible_facts['os_family'] == "Debian"

  - name: CREATE THE DEPARTMENTS GROUPS #This will create linux groups so that the "Valid users = @group" works
    group:
      name: "{{ item.force_group }}"
      state: present
    loop: "{{ samba_shares }}"
    when: item.force_group is defined

  - name: CREATE THE DIRECTORIES ON THE SERVER #This will create the actual directories on the disk
    file:
      path: "{{ item.path }}"
      state: directory
      owner: root
      group: "{{ item.force_group | default('root') }}"
      mode: '0770'
    loop: "{{ samba_shares }}"

  - name: DEPLOY THE SAMBA CONFIGURATIONS
    template:
      src: templates/smb.conf.j2
      dest: /etc/samba/smb.conf
      validate: "testparm -s %s"
    notify: RESTART SAMBA

  - name: CREATE LINUX USERS AND ADD TO GROUPS
    user:
      name: "{{ item.name }}"
      groups: "{{ item.group }}"
      append: yes
    loop: "{{ samba_users }}"

  - name: SET SAMBA PASSWORDS
    shell: "printf '{{ item.password }}\n{{ item.password }}\n' | smbpasswd -a {{ item.name }}"
    loop: "{{ samba_users }}"
    register: smbpasswd_result
    changed_when: "'Added user' in smbpasswd_result.stdout or 'Password changed' in smbpasswd_result.stdout"

  - name: ENSURE SAMBA AD SERVICE IS NOT ENABLED
    systemd:
      name: samba-ad-dc
      masked: no
      state: stopped
      enabled: no
      daemon_reload: yes

  - name: ENSURE SMB SERVICES ARE STARTED AND ENABLED
    systemd:
      name: "{{ item }}"
      state: started
      enabled: yes
    loop:
      - smbd
      - nmbd

    # ==========================================
    # LOG ROTATION SETUP
    # ==========================================
  - name: CONFIGURE LOGROTATE FOR CUSTOM APACHE LOGS
    ansible.builtin.copy:
      dest: /etc/logrotate.d/apache2-custom
      content: |
        /etc/apache2/logs/*.log {
            daily
            missingok
            rotate 14
            compress
            delaycompress
            notifempty
            create 0640 root adm
            sharedscripts
            prerotate
                if [ -d /etc/apache2/vhosts ] && [ -f /etc/apache2/vhosts/systemctl ]; then
                    systemctl reload apache2 > /dev/null
                fi
            endscript
            postrotate
                if systemctl is-active --quiet apache2; then
                    systemctl reload apache2 > /dev/null
                fi
            endscript
        }
      mode: '0644'

  - name: DEPLOY CUSTOM SYSTEM MOTD BANNER
    ansible.builtin.copy:
      dest: /etc/motd
      content: |
        ===============================================================
           WELCOME TO YOUR ANSIBLE SERVER ENVIRONMENT MARTIN CHUNGA :)
        ===============================================================
           Status: Managed by Ansible (ubuntu_server_config.yml)
           Services Active: Apache2 Web Server & Samba Active Directory
           Monitoring: Prometheus & Grafana System Metrics Engine Enabled
        ===============================================================
        Authorized access only. All actions are logged.
      mode: '0644'

    # ==========================================
    # PROMETHEUS & EXPORTER INSTALLATION
    # ==========================================
  - name: INSTALL PROMETHEUS SERVER PLATFORM DEPENDENCIES
    ansible.builtin.apt:
      name:
        - prometheus
        - prometheus-node-exporter
      state: latest

  - name: CONFIGURE PROMETHEUS LOCAL SCRAPE TARGETS
    ansible.builtin.copy:
      dest: /etc/prometheus/prometheus.yml
      content: |
        global:
          scrape_interval: 15s
        scrape_configs:
          - job_name: 'node'
            static_configs:
              - targets: ['localhost:9100']
          - job_name: 'prometheus'
            static_configs:
              - targets: ['localhost:9090']
      mode: '0644'
    notify: RESTART PROMETHEUS

  - name: ENSURE PROMETHEUS MONITORING STACK COMPONENTS ARE RUNNING
    ansible.builtin.systemd:
      name: "{{ item }}"
      state: started
      enabled: yes
    loop:
      - prometheus
      - prometheus-node-exporter

    # ==========================================
    # GRAFANA ANALYTICS ENGINE INSTALLATION
    # ==========================================
  - name: ENSURE GRAFANA APT REPOSITORY PREREQUISITES EXIST
    ansible.builtin.apt:
      name:
        - apt-transport-https
        - software-properties-common
        - wget
        - gnupg
      state: latest

  - name: ESTABLISH SECURE REPOSITORY KEYSTRING ECOSYSTEM
    ansible.builtin.file:
      path: /etc/apt/keyrings
      state: directory
      owner: root
      group: root
      mode: '0755'

  - name: DOWNLOAD GRAFANA OFFICIAL GPG KEY SECURELY
    ansible.builtin.get_url:
      url: "https://apt.grafana.com/gpg-full.key"
      dest: /etc/apt/keyrings/grafana.asc
      mode: '0644'

  - name: CONFIGURE GRAFANA STABLE PACKAGE STREAM REPOSITORY
    ansible.builtin.apt_repository:
      repo: "deb [signed-by=/etc/apt/keyrings/grafana.asc] https://apt.grafana.com stable main"
      state: present
      filename: grafana

  - name: INSTALL GRAFANA SYSTEM BINARIES
    ansible.builtin.apt:
      name: grafana
      update_cache: yes
      state: latest

    # ==========================================
    # AUTOMATED GRAFANA PROVISIONING
    # ==========================================
  - name: Automatically provision Prometheus data source in Grafana
    ansible.builtin.copy:
      dest: /etc/grafana/provisioning/datasources/prometheus.yaml
      content: |
        apiVersion: 1
        datasources:
          - name: Prometheus
            type: prometheus
            access: proxy
            url: http://localhost:9090
            isDefault: true
            editable: true
      owner: root
      group: grafana
      mode: "0640"
    notify: RESTART GRAFANA

  - name: CREATE GRAFANA DASHBOARD PROVISIONING CONFIGURATIONS
    ansible.builtin.copy:
      dest: /etc/grafana/provisioning/dashboards/local_provisioning.yaml
      content: |
        apiVersion: 1
        providers:
          - name: 'Dashboards Configured With Ansible'
            orgId: 1
            folder: ''
            type: file
            disableDeletion: false
            editable: true
            updateIntervalSeconds: 10
            options:
              path: /var/lib/grafana/dashboards
      owner: root
      group: grafana
      mode: "0640"
    notify: RESTART GRAFANA

  - name: ESTABLISH STORAGE DIRECTORY FOR RAW DASHBOARD PAYLOADS
    ansible.builtin.file:
      path: /var/lib/grafana/dashboards
      state: directory
      owner: grafana
      group: grafana
      mode: "0755"

  - name: Push metrics dashboard directly into Grafana Database via API
    ansible.builtin.uri:
      url: "http://localhost:3000/api/dashboards/db"
      method: POST
      user: "admin"
      password: "{{ vault_grafana_password }}"
      force_basic_auth: yes
      body_format: json
      body:
        overwrite: true
        folderId: 0
        dashboard:
          id: null
          uid: "node-metrics-full"
          title: "Ansible System Monitoring Analytics By Martin Chunga"
          tags: ["prometheus"]
          timezone: "browser"
          schemaVersion: 36,
          version: 1,
          panels: [
            {
              "id": 1, "type": "gauge", "title": "Total CPU Load",
              "gridPos": { "h": 6, "w": 8, "x": 0, "y": 0 },
              "datasource": { "type": "prometheus", "uid": "Prometheus" },
              "targets": [ { "expr": "100 - (avg(irate(node_cpu_seconds_total{mode='idle'}[5m])) * 100)", "legendFormat": "CPU %" } ]
            },
            {
              "id": 2, "type": "timeseries", "title": "Memory Capacity Over Time",
              "gridPos": { "h": 6, "w": 16, "x": 8, "y": 0 },
              "datasource": { "type": "prometheus", "uid": "Prometheus" },
              "targets": [ { "expr": "node_memory_MemTotal_bytes - node_memory_MemAvailable_bytes", "legendFormat": "Used RAM" } ]
            },
            {
              "id": 3, "type": "gauge", "title": "Root Filesystem Storage Space",
              "gridPos": { "h": 6, "w": 8, "x": 0, "y": 6 },
              "datasource": { "type": "prometheus", "uid": "Prometheus" },
              "targets": [ { "expr": "100 - ((node_filesystem_avail_bytes{mountpoint='/'} * 100) / node_filesystem_size_bytes{mountpoint='/'})", "legendFormat": "Disk % Used" } ]
            },
            {
              "id": 4, "type": "timeseries", "title": "Network Bandwidth Consumption",
              "gridPos": { "h": 6, "w": 16, "x": 8, "y": 6 },
              "datasource": { "type": "prometheus", "uid": "Prometheus" },
              "targets": [
                { "expr": "irate(node_network_receive_bytes_total{device!~'lo'}[5m])", "legendFormat": "Download traffic" },
                { "expr": "irate(node_network_transmit_bytes_total{device!~'lo'}[5m])", "legendFormat": "Upload traffic" }
              ]
            }
          ]
      status_code: 200
    register: grafana_api_response
    changed_when: "'success' in grafana_api_response.json.status"


  - name: FORCE SYSTEMD TO START AND LOCK GRAFANA ENGINE EXECUTION
    ansible.builtin.systemd:
      name: grafana-server
      state: started
      enabled: yes

    # ==========================================
    # UFW FIREWALL RULE ORCHESTRATION
    # ==========================================
  - name: RESET UFW FIREWALL ENGINE RULES TO STANDARD SECURE DEFAULT DENY POSTURE
    community.general.ufw:
      state: reset

  - name: CONFIGURE GLOBAL OUTBOUND TRAFFIC POLICY TO ALLOW ALL EGRESS CONNECTIONS
    community.general.ufw:
      direction: outgoing
      policy: allow

  - name: CONFIGURE GLOBAL INBOUND TRAFFIC POLICY TO BLOCK ALL INGRESS CONNECTIONS
    community.general.ufw:
      direction: incoming
      policy: deny

  - name: OPEN PUBLIC WEB INFRASTRUCTURE ACCESS ENDPOINTS SAFELY
    community.general.ufw:
      rule: allow
      port: "{{ item }}"
      proto: tcp
    loop:
      - '80'   # Apache HTTP entry point
      - '443'  # Apache Hardened HTTPS entry point

  - name: OPEN SAMBA NETWORK FILE SHARING STORAGE HUB ENDPOINTS LOCALLY
    community.general.ufw:
      rule: allow
      port: "{{ item }}"
      proto: tcp
      src: "{{ allowed_management_subnets[0] }}"
    loop:
      - '139'  # NetBIOS Session Service
      - '445'  # Microsoft-DS Active Directory Directory Services SMB

  - name: ISOLATE SECURE ADMINISTRATIVE SHELL ENTRY ENDPOINTS
    community.general.ufw:
      rule: allow
      port: "{{ ssh_port | string }}"
      proto: tcp
      src: "{{ item }}"
    loop: "{{ allowed_management_subnets }}"

  - name: ISOLATE INTERNAL ANALYTICS TRACKING ENGINE ENDPOINTS
    community.general.ufw:
      rule: allow
      port: "{{ item }}"
      proto: tcp
      src: "{{ allowed_management_subnets[0] }}"
    loop:
      - '3000' # Grafana Visuals Control Web Interface
      - '9090' # Prometheus Core Metric Engine Endpoint
      - '9100' # Node Exporter Resource Scraping Target

  - name: ACTIVATE UFW FIREWALL KERNEL ENFORCEMENT RUNTIME ENGINES
    community.general.ufw:
      state: enabled

    # ==========================================
    # BRUTE-FORCE PREVENTION VIA FAIL2BAN
    # ==========================================
  - name: DEPLOY AUTOMATED HOST DEFENSE SOFTWARE BINARIES
    ansible.builtin.apt:
      name: fail2ban
      state: latest

  - name: PROVISION CUSTOM JAIL CONFIGS FOR LOCAL SERVICE DEAMONS
    ansible.builtin.copy:
      dest: /etc/fail2ban/jail.local
      content: |
        [DEFAULT]
        bantime  = 1h
        findtime = 10m
        maxretry = 5

        [sshd]
        enabled  = true
        port     = {{ ssh_port }}
        logpath  = %(sshd_log)s
        backend  = %(sshd_backend)s

        [apache-auth]
        enabled  = true
        port     = http,https
        logpath  = %(apache_error_log)s
      mode: '0644'
    notify: RESTART FAIL2BAN

  - name: LOCK FAIL2BAN ENFORCEMENT SERVICES AT SYSTEM BOOT
    ansible.builtin.systemd:
      name: fail2ban
      state: started
      enabled: yes

    # ==========================================
    # SSH DAEMON ACCESS STRUCTURAL HARDENING
    # ==========================================
  - name: HARDEN SSH ACCESS PROFILES BY STRIPPING ADMIN ROOT REMOTE LOGINS
    ansible.builtin.lineinfile:
      path: /etc/ssh/sshd_config
      regexp: '^#?PermitRootLogin'
      line: 'PermitRootLogin no'
      state: present
    notify: RESTART SSH

  - name: HARDEN SSH EXCHANGE LAYERS BY DROPPING PLAINTEXT PASSWORDS IF PUBLIC
    ansible.builtin.lineinfile:
      path: /etc/ssh/sshd_config
      regexp: '^#?PasswordAuthentication'
      line: 'PasswordAuthentication yes' # Yes since am using --ask-become-pass
      state: present
    notify: RESTART SSH

  - name: VERIFY APACHE INSTALLATION AND CONFIGURATION
    block:
      - name: Check Apache service status
        ansible.builtin.systemd:
          name: apache2
        register: apache_service

      - name: Get Apache version
        ansible.builtin.command:
          cmd: apache2ctl -v
        register: apache_version
        changed_when: false

      - name: List enabled modules
        ansible.builtin.command:
          cmd: apache2ctl -M
        register: apache_modules_list
        changed_when: false

      - name: Test configuration syntax
        ansible.builtin.command:
          cmd: apache2ctl configtest
        register: config_test
        changed_when: false

      - name: Display Apache Health Summary
        ansible.builtin.debug:
          msg:
            - "------------------------------------------"
            - "SERVICE STATUS: {{ apache_service.status.ActiveState }}"
            - "APACHE VERSION: {{ apache_version.stdout_lines[0] }}"
            - "CONFIG CHECK:   {{ config_test.stderr | default('Syntax OK') }}"
            - "MODULES ACTIVE: {{ apache_modules_list.stdout_lines | length }} modules loaded"
            - "------------------------------------------"

  handlers:
    - name: RESTART SAMBA
      systemd:
        name: "{{ item }}"
        state: restarted
      loop:
        - smbd
        - nmbd

    - name: RESTART APACHE
      systemd:
        name: apache2
        state: restarted

    - name: RESTART PROMETHEUS
      systemd:
        name: prometheus
        state: restarted

    - name: RESTART GRAFANA
      systemd:
        name: grafana-server
        state: restarted

    - name: RESTART FAIL2BAN
      ansible.builtin.systemd:
        name: fail2ban
        state: restarted

    - name: RESTART SSH
      ansible.builtin.systemd:
        name: ssh
        state: restarted
