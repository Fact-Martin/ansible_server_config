---


- hosts: linux_server
  become: yes
  vars:
    samba_users:
      - { name: 'martin', group: 'it', password: 'martin12345'}
      - { name: 'chunga', group: 'finance', password: 'chunga12345'}
      - { name: 'cathy', group: 'operations', password: 'cathy12345'}
      - { name: 'grace', group: 'legal', password: 'grace12345'}

    samba_shares:
      - name: PUBLIC
        path: /srv/samba/public
        comment: "This is public share for all departments"
        guest_ok: yes
      - name: IT
        path: /srv/samba/it
        comment: "This folder is for the IT department only"
        valid_users: "@it"
        force_group: 'it'
      - name: FINANCE
        path: /srv/samba/finance
        comment: "This folder is for the Finance department only"
        valid_users: "@finance"
        force_group: 'finance'
      - name: LEGAL
        path: /srv/samba/legal
        comment: "This folder is for the Legal department only"
        valid_users: "@legal"
        force_group: 'legal'
      - name: OPERATIONS
        path: /srv/samba/operations
        comment: "This folder is for the Operations department only"
        valid_users: "@operations"
        force_group: 'operations'

    apache_modules:
      - rewrite
      - ssl
      - headers
      - proxy
      - proxy_http
      - proxy_wstunnel
      - deflate
      - expires
      - socache_shmcb

    # Global Parameters
    apache_server_admin: "ansible@malawi.com"
    apache_timeout: 300
    apache_keepalive: "On"
    apache_keepalive_timeout: 5
    apache_max_keepalive_requests: 100

    # Event MPM Parameter Tuning
    apache_mpm: "event"
    apache_mpm_start_servers: 2
    apache_mpm_min_spare_threads: 25
    apache_mpm_max_spare_threads: 75
    apache_mpm_thread_limit: 64
    apache_mpm_threads_per_child: 25
    apache_mpm_max_request_workers: 150

    # Virtual Host Declarations
    apache_vhosts:
      - domain: "malawi.com"
      - domain: "test.local"

  tasks:
 # - name: UPDATE REPOSITORIES
 #   apt:
 #     update_cache: yes

  - name: INSTALL APACHE2 WEB SERVER
    apt:
      name: apache2
      state: latest

  - name: ENSURE APACHE LOG DIRECTORY EXISTS
    file:
      path: /etc/apache2/logs
      state: directory
      owner: root
      group: root
      mode: "0755"

  - name: ENABLE APACHE MODULES
    apache2_module:
      name: "{{ item }}"
      state: present
    loop: "{{ apache_modules }}"
    notify: RESTART APACHE

  - name: DISABLE CONFLICTING APACHE MPM PREFORK MODULES
    apache2_module:
      name: mpm_prefork
      state: absent
      ignore_configcheck: true
    notify: RESTART APACHE

  - name: ENABLE THE TARGETED APACHE MPM MODULE
    apache2_module:
      name: "mpm_{{ apache_mpm }}"
      state: present
      ignore_configcheck: true
    notify: RESTART APACHE

  - name: DEPLOY THE DYNAMIC MAIN APACHE SYSTEM CONFIGURATION
    template:
      src: templates/apache2.conf.j2
      dest: /etc/apache2/apache2.conf
      owner: root
      group: root
      mode: "0644"
    notify: RESTART APACHE

  - name: ENSURE APACHE2 IS STARTED AND ENABLED
    systemd:
      name: apache2
      state: started
      enabled: true
    when: ansible_facts['os_family'] == "Debian"

  - name: DEPLOY HARDENED CORE SECURITY CONFIGS
    ansible.builtin.copy:
      dest: /etc/apache2/conf-available/security.conf
      content: |
        # Security configuration - managed by Ansible
        ServerTokens Prod
        ServerSignature Off
        Header always set X-Frame-Options "SAMEORIGIN"
        Header always set X-Content-Type-Options "nosniff"
        Header always set X-XSS-Protection "1; mode=block"
        Header always set Referrer-Policy "strict-origin-when-cross-origin"
        <Directory />
            Options -Indexes
            AllowOverride None
            Require all denied
        </Directory>
        TraceEnable Off
        LimitRequestBody 10485760
      owner: root
      group: root
      mode: "0644"
    notify: RESTART APACHE

  - name: ENABLE CORE SECURITY RUNTIME ADJUSTMENT
    ansible.builtin.command:
      cmd: a2enconf security
    register: security_conf
    changed_when: "'Enabling' in security_conf.stdout or 'already enabled' not in security_conf.stdout"
    when: ansible_facts['os_family'] == "Debian"
    notify: RESTART APACHE

  - name: PROVISION THE WEB DOCUMENTATIONROOT TARGETS
    ansible.builtin.file:
      path: "/var/www/{{ item.domain }}/public_html"
      state: directory
      owner: www-data
      group: www-data
      mode: "0755"
    loop: "{{ apache_vhosts }}"
    when: ansible_facts['os_family'] == "Debian"

  - name: INSTALL SAMBA PACKAGE ON UBUNTU
    apt:
      name:
       - samba
       - samba-common-bin
       - smbclient
      state: latest
    when: ansible_facts['os_family'] == "Debian"

  - name: CREATE THE DEPARTMENTS GROUPS #This will create linux groups so that the "Valid users = @group" works
    group:
      name: "{{ item.force_group }}"
      state: present
    loop: "{{ samba_shares }}"
    when: item.force_group is defined

  - name: CREATE THE DIRECTORIES ON THE SERVER #This will create the actual directories on the disk
    file:
      path: "{{ item.path }}"
      state: directory
      owner: root
      group: "{{ item.force_group | default('root') }}"
      mode: '0770'
    loop: "{{ samba_shares }}"

  - name: DEPLOY THE SAMBA CONFIGURATIONS
    template:
      src: templates/smb.conf.j2
      dest: /etc/samba/smb.conf
      validate: "testparm -s %s"
    notify: RESTART SAMBA

  - name: CREATE LINUX USERS AND ADD TO GROUPS
    user:
      name: "{{ item.name }}"
      groups: "{{ item.group }}"
      append: yes
    loop: "{{ samba_users }}"

  - name: SET SAMBA PASSWORDS
    shell: "printf '{{ item.password }}\n{{ item.password }}\n' | smbpasswd -a {{ item.name }}"
    loop: "{{ samba_users }}"
    register: smbpasswd_result
    changed_when: "'Added user' in smbpasswd_result.stdout or 'Password changed' in smbpasswd_result.stdout"

  - name: ENSURE SAMBA AD SERVICE IS NOT ENABLED
    systemd:
      name: samba-ad-dc
      masked: no
      state: stopped
      enabled: no
      daemon_reload: yes

  - name: ENSURE SMB SERVICES ARE STARTED AND ENABLED
    systemd:
      name: "{{ item }}"
      state: started
      enabled: yes
    loop:
      - smbd
      - nmbd

  handlers:
    - name: RESTART SAMBA
      systemd:
        name: "{{ item }}"
        state: restarted
      loop:
        - smbd
        - nmbd
    - name: RESTART APACHE
      systemd:
        name: apache2
        state: restarted
